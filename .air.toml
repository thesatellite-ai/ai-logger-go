root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["templ generate"]
  cmd = "go build -o ./tmp/ailog ./cmd/ailog"
  bin = "./tmp/ailog"
  full_bin = "./tmp/ailog ui --no-open"
  include_ext = ["go", "templ", "css", "js", "html"]
  exclude_dir = ["bin", "tmp", "vendor", "testdata", "node_modules", ".git"]
  exclude_regex = ["_test\\.go$", "_templ\\.go$"]
  include_dir = ["cmd", "internal"]
  delay = 200
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"
  log = "build-errors.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
