name: Release

# Three trigger paths:
#
#   push tag (v*)              → full release, published to GitHub Releases.
#                                Natural "cut a release" flow: bump a version,
#                                tag, push → release appears on the sidebar.
#
#   workflow_dispatch, tag=""  → snapshot build. GoReleaser runs with
#                                --snapshot, no GitHub Release is created,
#                                but cross-compiled archives are uploaded as
#                                a workflow artifact you can download from
#                                the run page. Use for ad-hoc binaries off
#                                an arbitrary branch.
#
#   workflow_dispatch, tag=v*  → create + push the tag on the current ref,
#                                then run the full release. Saves the
#                                "tag + push" step when running from the
#                                Actions UI. Fails if the tag already exists.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Leave empty for snapshot build.'
        required: false
        type: string

# `contents: write` — lets GoReleaser create the GitHub Release via the
# built-in GITHUB_TOKEN, and lets the tag-creation step push a new tag.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Only runs on workflow_dispatch when a tag input is provided.
      # Creates + pushes the tag so the GoReleaser step below sees it.
      - name: Create + push tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null; then
            echo "::error::tag ${{ inputs.tag }} already exists"
            exit 1
          fi
          git tag -a "${{ inputs.tag }}" -m "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      # Full release on push-tag + workflow_dispatch-with-tag. Snapshot
      # only when workflow_dispatch was used WITHOUT a tag — a push-tag
      # event must always be a real release.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: >-
            release --clean
            ${{ (github.event_name == 'workflow_dispatch' && inputs.tag == '') && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # dist/ uploaded for every run — redundant on real releases (easy
      # to grab from the Releases page) but required for snapshot runs.
      # always() runs even on failure so a half-built release still
      # leaves a trail to debug.
      - name: Upload dist/ as workflow artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ailog-${{ inputs.tag || github.ref_name }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30
